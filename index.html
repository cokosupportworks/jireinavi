<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>自立活動の指導事例ナビ</title>
  
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="自立活動ナビ">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      background-color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Search, Sparkles, BookOpen, Tag, X, User, ChevronDown, ChevronUp, Bot, Loader2, Settings, Key, Lock, AlertCircle, ExternalLink, Bookmark, Copy, Check, Trash2, Clock, ChevronRight, Cpu, Server, Link, Home } from 'https://esm.sh/lucide-react@0.292.0';

    const DUMMY_DATA = [
      { id: 1, category: "健康の保持", title: "睡眠時間レコーディング", summary: "毎日の就寝・起床時間を表に記録し、必要な睡眠時間がとれているか視覚的に確認する。", scene: "個別", tags: ["昼夜逆転", "睡眠不足", "日中の強い眠気", "生活リズムの乱れ", "自己管理能力の不足", "健康状態の維持困難", "テスト用タグA", "テスト用タグB", "テスト用タグC", "テスト用タグD", "ダミータグ1", "ダミータグ2", "ダミータグ3", "ダミータグ4", "ダミータグ5", "ダミータグ6", "ダミータグ7", "ダミータグ8", "ダミータグ9", "ダミータグ10", "ダミータグ11", "ダミータグ12", "ダミータグ13", "ダミータグ14", "ダミータグ15"] },
      { id: 2, category: "健康の保持", title: "朝の光浴びルーティン", summary: "起床時にカーテンを開け、朝日を浴びることで体内時計をリセットする習慣をつける。", scene: "個別", tags: ["朝起きられない", "覚醒水準が低い", "自律神経の乱れ", "体内時計のズレ", "生活習慣の未定着", "テスト用タグE", "テスト用タグF", "ダミータグ16", "ダミータグ17", "ダミータグ18", "ダミータグ19", "ダミータグ20", "ダミータグ21", "ダミータグ22", "ダミータグ23", "ダミータグ24"] },
      { id: 3, category: "心理的な安定", title: "リラックス魔法の深呼吸", summary: "イライラやパニックを感じた時に、魔法の呪文を唱えながら3回深呼吸をして心を落ち着かせる練習。", scene: "集団", tags: ["パニック", "感情のコントロール", "強い不安", "リラクゼーション"] },
      { id: 4, category: "人間関係の形成", title: "ありがとうカード交換会", summary: "友達の良かったところや感謝をカードに書いて交換し、自己肯定感と他者への思いやりを育む。", scene: "集団", tags: ["他者理解", "自己肯定感の低下", "コミュニケーション", "集団参加への不安"] }
    ];

    const CATEGORIES = [
      "すべて", "健康の保持", "心理的な安定", "人間関係の形成", "環境の把握", "身体の動き", "コミュニケーション"
    ];

    const CATEGORY_COLORS = {
      "健康の保持": "bg-green-100 text-green-800 border-green-400",
      "心理的な安定": "bg-pink-100 text-pink-800 border-pink-400",
      "人間関係の形成": "bg-orange-100 text-orange-800 border-orange-400",
      "環境の把握": "bg-purple-100 text-purple-800 border-purple-400",
      "身体の動き": "bg-blue-100 text-blue-800 border-blue-400",
      "コミュニケーション": "bg-yellow-100 text-yellow-800 border-yellow-400",
      "default": "bg-gray-100 text-gray-800 border-gray-400"
    };

    const CopyButton = ({ text }) => {
      const [copied, setCopied] = useState(false);

      const handleCopy = () => {
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(() => setCopied(true)).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
      };

      const fallbackCopy = () => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
        } catch (err) {
          console.error('Copy failed', err);
        }
        document.body.removeChild(textArea);
      };

      useEffect(() => {
        if (copied) {
          const t = setTimeout(() => setCopied(false), 2000);
          return () => clearTimeout(t);
        }
      }, [copied]);

      return (
        <button
          onClick={handleCopy}
          className={`flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-extrabold text-xl border-[3px] transition-all active:scale-95 shadow-sm w-full sm:w-auto ${
            copied ? 'bg-green-100 text-green-700 border-green-300' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'
          }`}
        >
          {copied ? <Check className="w-6 h-6" /> : <Copy className="w-6 h-6" />}
          {copied ? 'コピーしました' : '📋 コピーする'}
        </button>
      );
    };

    const formatDate = (ts) => {
      const d = new Date(ts);
      const pad = (n) => n.toString().padStart(2, '0');
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    function App() {
      const [isUnlocked, setIsUnlocked] = useState(() => localStorage.getItem('app_unlocked') === 'true');
      const [passcodeInput, setPasscodeInput] = useState("");
      const [passcodeError, setPasscodeError] = useState("");

      const [cases, setCases] = useState([]);
      const [isDataLoading, setIsDataLoading] = useState(true);
      const [isFallbackMode, setIsFallbackMode] = useState(false);

      const [searchQuery, setSearchQuery] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("すべて");
      const [selectedTags, setSelectedTags] = useState([]);
      
      const [scale, setScale] = useState(1);
      const [appHeight, setAppHeight] = useState(1024);
      
      const [isFilterOpen, setIsFilterOpen] = useState(false);

      const [aiProvider, setAiProvider] = useState(() => localStorage.getItem('ai_provider') || "gemini");
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || "");
      const [localApiFormat, setLocalApiFormat] = useState(() => localStorage.getItem('local_api_format') || "openai");
      const [localApiUrl, setLocalApiUrl] = useState(() => localStorage.getItem('local_api_url') || "http://127.0.0.1:8080/v1/chat/completions");
      const [localModelName, setLocalModelName] = useState(() => localStorage.getItem('local_model_name') || "");
      const [localApiKey, setLocalApiKey] = useState(() => localStorage.getItem('local_api_key') || "");

      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      
      const [tempAiProvider, setTempAiProvider] = useState("");
      const [tempApiKey, setTempApiKey] = useState("");
      const [tempLocalApiFormat, setTempLocalApiFormat] = useState("");
      const [tempLocalApiUrl, setTempLocalApiUrl] = useState("");
      const [tempLocalBaseUrl, setTempLocalBaseUrl] = useState("");
      const [tempLocalModelName, setTempLocalModelName] = useState("");
      const [tempLocalApiKey, setTempLocalApiKey] = useState("");

      const [isAiModalOpen, setIsAiModalOpen] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiContent, setAiContent] = useState("");
      const [aiTargetCase, setAiTargetCase] = useState(null);
      const [aiError, setAiError] = useState("");

      const [myList, setMyList] = useState(() => {
        try {
          const saved = localStorage.getItem('app_my_list');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });
      const [isMyListOpen, setIsMyListOpen] = useState(false);
      const [confirmAddCase, setConfirmAddCase] = useState(null);
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [viewAiPlan, setViewAiPlan] = useState(null);
      const [viewSavedCase, setViewSavedCase] = useState(null);

      const [lastModifiedDate, setLastModifiedDate] = useState("");

      const listRef = useRef(null);

      useEffect(() => {
        localStorage.setItem('app_my_list', JSON.stringify(myList));
      }, [myList]);

      useEffect(() => {
        if (!isUnlocked) return;

        const loadCasesData = async () => {
          try {
            const response = await fetch('./cases.json');
            if (!response.ok) throw new Error("Network response was not ok");
            
            const lastModifiedHeader = response.headers.get('Last-Modified');
            if (lastModifiedHeader) {
              const date = new Date(lastModifiedHeader);
              const formattedDate = `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
              setLastModifiedDate(formattedDate);
            } else {
              setLastModifiedDate("-");
            }

            const rawData = await response.json();
            
            let dataArray = [];
            if (Array.isArray(rawData)) {
              dataArray = rawData;
            } else if (typeof rawData === 'object' && rawData !== null) {
              const firstArrayKey = Object.keys(rawData).find(key => Array.isArray(rawData[key]));
              if (firstArrayKey) dataArray = rawData[firstArrayKey];
            }

            const formattedCases = dataArray.map(item => {
              let tagsArray = [];
              if (Array.isArray(item.tags)) {
                tagsArray = item.tags;
              } else if (typeof item.tags === 'string') {
                tagsArray = item.tags.split(',').map(t => t.trim()).filter(Boolean);
              }
              return { ...item, tags: tagsArray };
            });

            if (formattedCases.length === 0) throw new Error("有効なデータが見つかりません");
            setCases(formattedCases);
            setIsDataLoading(false);
          } catch (error) {
            console.warn("ローカル/プレビュー環境のため、テストデータを読み込みました:", error);
            setCases(DUMMY_DATA);
            setIsFallbackMode(true);
            setIsDataLoading(false);
            setLastModifiedDate("テスト環境");
          }
        };
        loadCasesData();
      }, [isUnlocked]);

      useEffect(() => {
        const handleResize = () => {
          const currentScale = window.innerWidth / 768;
          setScale(currentScale);
          const calculatedHeight = window.innerHeight / currentScale;
          setAppHeight(calculatedHeight);
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const allTags = useMemo(() => {
        const tags = new Set();
        if (Array.isArray(cases)) {
          cases.forEach(c => {
            if (selectedCategory === "すべて" || c.category === selectedCategory) {
              if (Array.isArray(c.tags)) {
                c.tags.forEach(t => tags.add(t));
              }
            }
          });
        }
        return Array.from(tags).sort();
      }, [cases, selectedCategory]);

      const filteredCases = useMemo(() => {
        if (!Array.isArray(cases)) return [];
        return cases.filter(c => {
          const matchCategory = selectedCategory === "すべて" || c.category === selectedCategory;
          const caseTags = Array.isArray(c.tags) ? c.tags : [];
          const matchSearch = c.title?.includes(searchQuery) || c.summary?.includes(searchQuery) || caseTags.some(tag => tag.includes(searchQuery));
          const matchTags = selectedTags.every(t => caseTags.includes(t));
          return matchCategory && matchSearch && matchTags;
        });
      }, [cases, searchQuery, selectedCategory, selectedTags]);

      const toggleTag = (tag) => {
        if (selectedTags.includes(tag)) {
          setSelectedTags(selectedTags.filter(t => t !== tag));
        } else {
          setSelectedTags([...selectedTags, tag]);
        }
      };

      const scrollToTop = () => {
        if (listRef.current) {
          listRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const handleBaseUrlChange = (e) => {
        const baseUrl = e.target.value;
        setTempLocalBaseUrl(baseUrl);
        
        if (baseUrl) {
          const cleanBaseUrl = baseUrl.replace(/\/+$/, '');
          if (tempLocalApiFormat === 'ollama') {
            setTempLocalApiUrl(`${cleanBaseUrl}/api/chat`);
          } else {
            setTempLocalApiUrl(`${cleanBaseUrl}/v1/chat/completions`);
          }
        } else {
          setTempLocalApiUrl("");
        }
      };

      const handleSaveApiKey = () => {
        setAiProvider(tempAiProvider);
        localStorage.setItem('ai_provider', tempAiProvider);
        
        setApiKey(tempApiKey);
        localStorage.setItem('gemini_api_key', tempApiKey);

        setLocalApiFormat(tempLocalApiFormat);
        localStorage.setItem('local_api_format', tempLocalApiFormat);

        setLocalApiUrl(tempLocalApiUrl);
        localStorage.setItem('local_api_url', tempLocalApiUrl);
        
        setLocalModelName(tempLocalModelName);
        localStorage.setItem('local_model_name', tempLocalModelName);
        
        setLocalApiKey(tempLocalApiKey);
        localStorage.setItem('local_api_key', tempLocalApiKey);
        
        setIsSettingsOpen(false);
      };

      const handleDeleteApiKey = () => {
        if (tempAiProvider === 'gemini') {
          setApiKey("");
          setTempApiKey("");
          localStorage.removeItem('gemini_api_key');
        } else {
          setLocalApiKey("");
          setTempLocalApiKey("");
          localStorage.removeItem('local_api_key');
        }
      };

      const handleUnlockSubmit = (e) => {
        e.preventDefault();
        try {
          const hashedInput = btoa(passcodeInput.split('').reverse().join(''));
          const secret = "aWEza2w5dW8xc2M=";

          if (hashedInput === secret) {
            localStorage.setItem('app_unlocked', 'true');
            setIsUnlocked(true);
            setPasscodeError("");
          } else {
            setPasscodeError("パスコードが正しくありません");
            setPasscodeInput("");
          }
        } catch (error) {
          setPasscodeError("無効な文字が含まれています");
        }
      };

      const addToMyList = (type, title, content, caseData) => {
        const newItem = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
          type, 
          timestamp: Date.now(),
          title,
          content,
          caseData
        };
        setMyList(prev => [newItem, ...prev]);
      };

      const executeDeleteFromMyList = () => {
        if (confirmDeleteId) {
          setMyList(prev => prev.filter(item => item.id !== confirmDeleteId));
          setConfirmDeleteId(null);
        }
      };

      const generateAiPlan = async (item) => {
        if (aiProvider === 'gemini' && !apiKey) {
          setTempAiProvider('gemini');
          setTempApiKey("");
          setIsSettingsOpen(true);
          return;
        }
        if (aiProvider === 'local' && !localApiUrl) {
          setTempAiProvider('local');
          setTempLocalApiUrl("http://127.0.0.1:8080/v1/chat/completions");
          setTempLocalApiFormat("openai");
          setIsSettingsOpen(true);
          return;
        }

        setAiTargetCase(item);
        setIsAiModalOpen(true);
        setAiLoading(true);
        setAiContent("");
        setAiError("");

        try {
          const prompt = `あなたは特別支援教育の経験豊富な専門家です。明るく、具体的で、先生方が実践しやすい言葉遣いで記述してください。\n\n以下の「自立活動の指導事例」データを元に、明日から実際の授業で使える具体的な【指導の略案】を作成してください。\n\n対象：小学生〜中学生の該当課題を持つ児童生徒\n出力形式（以下の見出しに沿って箇条書きなどでわかりやすく）：\n【指導の目標】\n【準備物・環境設定】\n【指導の展開（導入・展開・まとめ）】\n【指導上の留意点・評価基準】\n\n--- 事例データ ---\n名称：${item.title}\n区分：${item.category}\n場面：${item.scene}\n概要：${item.summary}\n課題タグ：${(item.tags || []).join(', ')}`;
          
          let generatedText = "";

          if (aiProvider === 'gemini') {
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
            const listRes = await fetch(listUrl);
            
            if (!listRes.ok) throw new Error("APIキーが無効か、モデル一覧が取得できませんでした。設定からAPIキーが正しく入力されているか確認してください。");
            
            const listData = await listRes.json();
            const availableModels = listData.models || [];
            
            const generateModels = availableModels.filter(m => 
              m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")
            );

            if (generateModels.length === 0) throw new Error("このAPIキーで利用可能なテキスト生成モデルが見つかりません。");

            let selectedModel = generateModels.find(m => m.name.includes("gemini-1.5-flash"));
            if (!selectedModel) selectedModel = generateModels.find(m => m.name.includes("gemini-1.5-pro"));
            if (!selectedModel) selectedModel = generateModels.find(m => m.name.includes("gemini"));
            if (!selectedModel) selectedModel = generateModels[0]; 

            const exactModelName = selectedModel.name; 
            const generateUrl = `https://generativelanguage.googleapis.com/v1beta/${exactModelName}:generateContent?key=${apiKey}`;

            const payload = {
              contents: [{ parts: [{ text: prompt }] }]
            };

            const res = await fetch(generateUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            
            if (!res.ok) {
              let errorMsg = `HTTP Error: ${res.status}`;
              try {
                const errorData = await res.json();
                if (errorData.error && errorData.error.message) {
                  errorMsg = errorData.error.message;
                }
              } catch (e) {}
              throw new Error(`生成エラー: ${errorMsg}`);
            }
            
            const data = await res.json();
            generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

          } else if (aiProvider === 'local') {
            const headers = { "Content-Type": "application/json" };
            if (localApiKey) {
              headers["Authorization"] = `Bearer ${localApiKey}`;
            }

            let payload;
            if (localApiFormat === 'ollama') {
              payload = {
                model: localModelName || "llama-3.2-1b-instruct-4bit",
                messages: [
                  { role: "system", content: "あなたは特別支援教育の経験豊富な専門家です。明るく、具体的で、先生方が実践しやすい言葉遣いで記述してください。" },
                  { role: "user", content: prompt }
                ],
                stream: false 
              };
            } else {
              payload = {
                model: localModelName || "llama-3.2-1b-instruct-4bit",
                messages: [
                  { role: "system", content: "あなたは特別支援教育の経験豊富な専門家です。明るく、具体的で、先生方が実践しやすい言葉遣いで記述してください。" },
                  { role: "user", content: prompt }
                ],
                temperature: 0.7
              };
            }

            const res = await fetch(localApiUrl, {
              method: "POST",
              headers,
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              let errorMsg = `HTTP Error: ${res.status}`;
              try {
                const errorData = await res.json();
                if (errorData.error && errorData.error.message) {
                  errorMsg = errorData.error.message;
                }
              } catch (e) {}
              throw new Error(`生成エラー: ${errorMsg}\n※APIの形式(OllamaかOpenAI互換か)が間違っているか、ブラウザに通信がブロックされています。`);
            }

            const data = await res.json();
            
            if (localApiFormat === 'ollama') {
              generatedText = data.message?.content;
            } else {
              generatedText = data.choices?.[0]?.message?.content;
            }
          }
          
          if (generatedText) {
            setAiContent(generatedText);
            addToMyList('ai_plan', item.title, generatedText, item);
          } else {
            throw new Error("応答テキストが空でした");
          }

        } catch (err) {
          console.error("AI Generation Error:", err);
          let errMsg = err.message;
          if (errMsg.includes('Failed to fetch') || errMsg.includes('NetworkError')) {
             errMsg = "AIサーバーに接続できませんでした(Load failed)。\n\n【原因】\niPhone（Safari）のセキュリティ機能により、暗号化通信（https）の当サイトから、ローカルAI（http）へのアクセスが強制ブロックされています（Mixed Content）。\n\n【解決策】\n設定画面のベースURLを「http://127.0.0.1:8080」または「http://127.0.0.1:11434」に書き換えてお試しください。（127.0.0.1であればブロックを回避できる場合があります）。それでもダメな場合はGeminiをご利用ください。";
          }
          setAiError(`${errMsg}`);
        } finally {
          setAiLoading(false);
        }
      };

      if (!isUnlocked) {
        return (
          <div className="fixed inset-0 bg-gray-900 flex items-center justify-center overflow-hidden select-none touch-none">
             <div className="bg-white p-10 rounded-3xl shadow-2xl flex flex-col items-center max-w-md w-full mx-6 border-4 border-purple-200 animate-in fade-in zoom-in duration-300">
                <div className="w-24 h-24 bg-purple-100 rounded-full flex items-center justify-center mb-6 shadow-inner">
                  <Lock className="w-12 h-12 text-purple-600" />
                </div>
                <h2 className="text-3xl font-extrabold text-gray-800 mb-3">アクセス制限</h2>
                <p className="text-gray-500 font-bold mb-8 text-center text-lg leading-relaxed">
                  このアプリを利用するには<br/>パスコードを入力してください
                </p>
                
                <form onSubmit={handleUnlockSubmit} className="w-full flex flex-col gap-5">
                  <input
                    type="password"
                    value={passcodeInput}
                    onChange={(e) => setPasscodeInput(e.target.value)}
                    className="w-full p-5 rounded-2xl border-[3px] border-gray-200 focus:border-purple-500 outline-none text-2xl font-bold font-mono text-center shadow-sm"
                    placeholder="パスコード"
                  />
                  {passcodeError && (
                    <p className="text-red-500 font-extrabold text-center bg-red-50 p-2 rounded-lg border-2 border-red-200">
                      {passcodeError}
                    </p>
                  )}
                  <button
                    type="submit"

            {isSettingsOpen && (
              <div className="absolute inset-0 bg-black/60 z-[110] flex items-center justify-center p-6 backdrop-blur-sm">
                <div className="bg-white w-[600px] max-h-[90%] overflow-y-auto rounded-3xl shadow-2xl flex flex-col p-8 border-4 border-gray-200 animate-in fade-in zoom-in duration-200 relative">
                  <button 
                    onClick={() => setIsSettingsOpen(false)}
                    className="absolute top-6 right-6 w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-200 active:scale-95"
                  >
                    <X className="w-8 h-8" />
                  </button>
                  
                  <h2 className="text-3xl font-extrabold text-gray-800 flex items-center gap-2 mb-6">
                    <Settings className="w-8 h-8 text-gray-600" />
                    AI・API設定
                  </h2>

                  <div className="flex gap-2 mb-6 p-1 bg-gray-100 rounded-xl">
                    <button 
                      onClick={() => setTempAiProvider('gemini')}
                      className={`flex-1 py-3 rounded-lg font-bold text-lg transition-all flex items-center justify-center gap-2 ${tempAiProvider === 'gemini' ? 'bg-white shadow text-purple-700' : 'text-gray-500 hover:bg-gray-200'}`}
                    >
                      <Sparkles className="w-5 h-5"/> Google Gemini
                    </button>
                    <button 
                      onClick={() => setTempAiProvider('local')}
                      className={`flex-1 py-3 rounded-lg font-bold text-lg transition-all flex items-center justify-center gap-2 ${tempAiProvider === 'local' ? 'bg-white shadow text-blue-700' : 'text-gray-500 hover:bg-gray-200'}`}
                    >
                      <Cpu className="w-5 h-5"/> ローカルAI (互換API)
                    </button>
                  </div>
                  
                  <p className="text-base font-bold text-gray-600 mb-6 leading-relaxed bg-gray-50 p-4 rounded-xl border border-gray-200">
                    {tempAiProvider === 'gemini' ? (
                      <>
                        AI機能を利用するには、Gemini APIキーが必要です。<br />
                        入力されたキーは<span className="text-red-500">お使いのブラウザ（端末内）にのみ保存</span>されます。
                      </>
                    ) : (
                      <>
                        Ollamaやai.local等のローカルAIに接続します。<br />
                        <span className="text-red-500 text-sm mt-1 inline-block">※HTTPSのWebサイトからHTTPのローカルサーバーへ接続する場合、ブラウザのセキュリティ設定で通信がブロックされる（Mixed Content）ことがあります。</span>
                      </>
                    )}
                  </p>

                  {tempAiProvider === 'gemini' ? (
                    <>
                      <a 
                        href="https://aistudio.google.com/app/apikey" 
                        target="_blank" 
                        rel="noopener noreferrer"
                        className="mb-6 w-full flex items-center justify-center gap-2 py-4 px-4 bg-blue-50 text-blue-700 font-extrabold text-xl rounded-xl border-[3px] border-blue-200 hover:bg-blue-100 active:scale-95 transition-all shadow-sm"
                      >
                        <ExternalLink className="w-6 h-6" />
                        APIキーの取得・確認はこちら (Google AI Studio)
                      </a>

                      <div className="flex flex-col gap-2 mb-8">
                        <label className="text-base font-bold text-gray-500 flex items-center gap-1">
                          <Key className="w-5 h-5" /> Gemini API Key
                        </label>
                        <input
                          type="password"
                          className="w-full p-4 rounded-xl border-4 border-gray-200 focus:border-purple-500 outline-none text-xl font-bold font-mono"
                          placeholder="AIzaSy..."
                          value={tempApiKey}
                          onChange={(e) => setTempApiKey(e.target.value)}
                        />
                      </div>
                    </>
                  ) : (
                    <div className="flex flex-col gap-4 mb-8">
                      <div className="flex flex-col gap-1 mb-2">
                        <label className="text-base font-bold text-gray-500 flex items-center gap-1">
                          <Cpu className="w-5 h-5" /> APIの形式
                        </label>
                        <div className="flex gap-4">
                          <label className="flex items-center gap-2 font-bold text-gray-700 cursor-pointer">
                            <input 
                              type="radio" 
                              name="apiFormat" 
                              value="openai" 
                              checked={tempLocalApiFormat === 'openai'} 
                              onChange={() => {
                                setTempLocalApiFormat('openai');
                                if (tempLocalBaseUrl) setTempLocalApiUrl(`${tempLocalBaseUrl.replace(/\/+$/, '')}/v1/chat/completions`);
                              }} 
                              className="w-5 h-5 text-blue-600" 
                            />
                            OpenAI互換
                          </label>
                          <label className="flex items-center gap-2 font-bold text-gray-700 cursor-pointer">
                            <input 
                              type="radio" 
                              name="apiFormat" 
                              value="ollama" 
                              checked={tempLocalApiFormat === 'ollama'} 
                              onChange={() => {
                                setTempLocalApiFormat('ollama');
                                if (tempLocalBaseUrl) setTempLocalApiUrl(`${tempLocalBaseUrl.replace(/\/+$/, '')}/api/chat`);
                              }} 
                              className="w-5 h-5 text-blue-600" 
                            />
                            Ollamaネイティブ
                          </label>
                        </div>
                      </div>

                      <div className="flex flex-col gap-1">
                        <label className="text-base font-bold text-gray-500 flex items-center gap-1">
                          <Home className="w-5 h-5" /> ベースURL (ai.local等のBonjour Name)
                        </label>
                        <input
                          type="text"
                          className="w-full p-3 rounded-xl border-[3px] border-blue-200 focus:border-blue-500 outline-none text-lg font-bold font-mono bg-blue-50"
                          placeholder="http://127.0.0.1:8080"
                          value={tempLocalBaseUrl}
                          onChange={handleBaseUrlChange}
                        />
                        <p className="text-sm font-bold text-gray-400 ml-1">※ペーストすると下のエンドポイントURLが自動生成されます。Safari回避のため 127.0.0.1 形式を推奨</p>
                      </div>

                      <div className="flex flex-col gap-1 mt-2">
                        <label className="text-base font-bold text-gray-500 flex items-center gap-1">
                          <Link className="w-5 h-5" /> エンドポイントURL (自動生成 / 編集可)
                        </label>
                        <input
                          type="text"
                          className="w-full p-3 rounded-xl border-[3px] border-gray-200 focus:border-blue-500 outline-none text-lg font-bold font-mono"
                          placeholder={tempLocalApiFormat === 'ollama' ? "http://127.0.0.1:8080/api/chat" : "http://127.0.0.1:8080/v1/chat/completions"}
                          value={tempLocalApiUrl}
                          onChange={(e) => setTempLocalApiUrl(e.target.value)}
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-base font-bold text-gray-500 flex items-center gap-1">
                          <Server className="w-5 h-5" /> モデル名 (省略可)
                        </label>
                        <input
                          type="text"
                          className="w-full p-3 rounded-xl border-[3px] border-gray-200 focus:border-blue-500 outline-none text-lg font-bold font-mono"
                          placeholder="llama-3.2-1b-instruct-4bit など"
                          value={tempLocalModelName}
                          onChange={(e) => setTempLocalModelName(e.target.value)}
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <label className="text-base font-bold text-gray-500 flex items-center gap-1">
                          <Lock className="w-5 h-5" /> APIキー (省略可)
                        </label>
                        <input
                          type="password"
                          className="w-full p-3 rounded-xl border-[3px] border-gray-200 focus:border-blue-500 outline-none text-lg font-bold font-mono"
                          placeholder="要求される場合のみ"
                          value={tempLocalApiKey}
                          onChange={(e) => setTempLocalApiKey(e.target.value)}
                        />
                      </div>
                    </div>
                  )}

                  <div className="flex justify-end gap-4 mt-auto">
                    {((tempAiProvider === 'gemini' && apiKey) || (tempAiProvider === 'local' && localApiKey)) && (
                      <button 
                        onClick={handleDeleteApiKey}
                        className="px-6 py-3 rounded-xl font-extrabold text-xl text-red-600 bg-red-50 hover:bg-red-100 border-[3px] border-red-200 transition-colors active:scale-95"
                      >
                        キーを削除
                      </button>
                    )}
                    <button 
                      onClick={handleSaveApiKey}
                      className={`px-8 py-3 rounded-xl font-extrabold text-xl text-white shadow-md transition-colors active:scale-95 ${tempAiProvider === 'local' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-purple-600 hover:bg-purple-700'}`}
                    >
                      保存して閉じる
                    </button>
                  </div>
                </div>
              </div>
            )}

            {isAiModalOpen && (
              <div className="absolute inset-0 bg-black/60 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
                <div className="bg-white w-full h-[90%] max-h-[900px] rounded-3xl shadow-2xl flex flex-col overflow-hidden relative border-4 border-amber-300 animate-in fade-in zoom-in duration-200">
                  
                  <header className="h-[80px] bg-gradient-to-r from-amber-100 to-orange-100 flex items-center justify-between px-6 border-b-[3px] border-amber-200 shrink-0">
                    <h2 className="text-2xl font-extrabold text-orange-800 flex items-center gap-2">
                       <Bot className="w-8 h-8 text-orange-600" />
                       ✨AI指導案アシスタント
                    </h2>
                    <button 
                      onClick={() => setIsAiModalOpen(false)}
                      className="w-12 h-12 bg-white rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 border-2 border-gray-200 active:scale-95"
                    >
                      <X className="w-8 h-8" />
                    </button>
                  </header>

                  <div className="bg-white px-6 py-4 border-b-2 border-orange-100 shrink-0 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <p className="text-xl font-bold text-gray-700 truncate flex-1 w-full">
                      対象事例：{aiTargetCase?.title}
                    </p>
                    {!aiLoading && !aiError && aiContent && (
                      <CopyButton text={aiContent} />
                    )}
                  </div>

                  <div 
                    className="flex-1 overflow-y-auto p-6 bg-gray-50 [&::-webkit-scrollbar]:w-3 [&::-webkit-scrollbar-track]:bg-gray-100 [&::-webkit-scrollbar-track]:rounded-full [&::-webkit-scrollbar-thumb]:bg-amber-300 [&::-webkit-scrollbar-thumb]:rounded-full"
                    style={{ WebkitOverflowScrolling: 'touch' }}
                  >
                    {aiLoading ? (
                      <div className="w-full h-full flex flex-col items-center justify-center text-amber-600 gap-4">
                        <Loader2 className="w-16 h-16 animate-spin" />
                        <p className="text-2xl font-extrabold animate-pulse">AIが指導案を考えています...</p>
                        <p className="text-lg font-bold text-amber-700/70">数秒お待ちください</p>
                      </div>
                    ) : aiError ? (
                      <div className="w-full h-full flex flex-col items-center justify-center text-red-500 gap-4">
                        <X className="w-16 h-16" />
                        <p className="text-xl font-extrabold text-center whitespace-pre-wrap">{aiError}</p>
                      </div>
                    ) : (
                      <div className="text-xl font-bold text-gray-800 leading-loose whitespace-pre-wrap bg-white p-6 rounded-2xl border-2 border-gray-200 shadow-sm">
                        {aiContent}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
