<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useEffect, useRef } from 'https://esm.sh/react@18?dev';
    import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
    import { Search, Sparkles, BookOpen, Tag, X, User, ChevronDown, ChevronUp, Bot, Loader2, Settings, Key, Lock, AlertCircle, ExternalLink, Bookmark, Copy, Check, Trash2, Clock, ChevronRight, HelpCircle, CreditCard, CheckCircle, Cpu, Link, Server, Home, Download } from 'https://esm.sh/lucide-react@0.292.0';

    const DUMMY_DATA = [
      { id: 1, category: "健康の保持", title: "睡眠時間レコーディング", summary: "毎日の就寝・起床時間を表に記録し、必要な睡眠時間がとれているか視覚的に確認する。", scene: "個別", tags: ["昼夜逆転", "睡眠不足", "日中の強い眠気", "生活リズムの乱れ", "生活管理能力の不足", "健康状態の維持困難", "テスト用タグA", "テスト用タグB", "テスト用タグC", "テスト用タグD", "ダミータグ1", "ダミータグ2", "ダミータグ3", "ダミータグ4", "ダミータグ5", "ダミータグ6", "ダミータグ7", "ダミータグ8", "ダミータグ9", "ダミータグ10", "ダミータグ11", "ダミータグ12", "ダミータグ13", "ダミータグ14", "ダミータグ15"] },
      { id: 2, category: "健康の保持", title: "朝の光浴びルーティン", summary: "起床時にカーテンを開け、朝日を浴びることで体内時計をリセットする習慣をつける。", scene: "個別", tags: ["朝起きられない", "覚醒水準が低い", "自律神経の乱れ", "体内時計のズレ", "生活習慣の未定着", "テスト用タグE", "テスト用タグF", "ダミータグ16", "ダミータグ17", "ダミータグ18", "ダミータグ19", "ダミータグ20", "ダミータグ21", "ダミータグ22", "ダミータグ23", "ダミータグ24"] },
      { id: 3, category: "心理的な安定", title: "リラックス魔法の深呼吸", summary: "イライラやパニックを感じた時に、魔法の呪文を唱えながら3回深呼吸をして心を落ち着かせる練習。", scene: "集団", tags: ["パニック", "感情のコントロール", "強い不安", "リラクゼーション"] },
      { id: 4, category: "人間関係の形成", title: "ありがとうカード交換会", summary: "友達の良かったところや感謝をカードに書いて交換し、自己肯定感と他者への思いやりを育む。", scene: "集団", tags: ["他者理解", "自己肯定感の低下", "コミュニケーション", "集団参加への不安"] }
    ];

    const CATEGORIES = [
      "すべて", "健康の保持", "心理的な安定", "人間関係の形成", "環境の把握", "身体の動き", "コミュニケーション"
    ];

    const CATEGORY_COLORS = {
      "健康の保持": "bg-green-100 text-green-800 border-green-400",
      "心理的な安定": "bg-pink-100 text-pink-800 border-pink-400",
      "人間関係の形成": "bg-orange-100 text-orange-800 border-orange-400",
      "環境の把握": "bg-purple-100 text-purple-800 border-purple-400",
      "身体の動き": "bg-blue-100 text-blue-800 border-blue-400",
      "コミュニケーション": "bg-yellow-100 text-yellow-800 border-yellow-400",
      "default": "bg-gray-100 text-gray-800 border-gray-400"
    };

    const CopyButton = ({ text }) => {
      const [copied, setCopied] = useState(false);

      const handleCopy = () => {
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(() => setCopied(true)).catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
      };

      const fallbackCopy = () => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
        } catch (err) {
          console.error('Copy failed', err);
        }
        document.body.removeChild(textArea);
      };

      useEffect(() => {
        if (copied) {
          const t = setTimeout(() => setCopied(false), 2000);
          return () => clearTimeout(t);
        }
      }, [copied]);

      return (
        <button
          onClick={handleCopy}
          className={`flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-extrabold text-xl border-[3px] transition-all active:scale-95 shadow-sm w-full sm:w-auto ${
            copied ? 'bg-green-100 text-green-700 border-green-300' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'
          }`}
        >
          {copied ? <Check className="w-6 h-6" /> : <Copy className="w-6 h-6" />}
          {copied ? 'コピーしました' : '📋 コピーする'}
        </button>
      );
    };

    const formatDate = (ts) => {
      const d = new Date(ts);
      const pad = (n) => n.toString().padStart(2, '0');
      return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    };

    const renderFormattedText = (text) => {
      if (!text) return null;
      
      const lines = text.split('\n');
      return lines.map((line, idx) => {
        let currentLine = line;
        
        const headerMatch = currentLine.match(/^(#{1,6})\s*(.*)$/);
        if (headerMatch) {
          const content = headerMatch[2].replace(/\*\*|__/g, ''); 
          return (
            <h4 key={idx} className="text-2xl font-black text-purple-900 mt-6 mb-3 border-b-[3px] border-purple-200 pb-1.5 leading-snug shrink-0">
              {content}
            </h4>
          );
        }
        
        const listMatch = currentLine.match(/^[\*\-\+]\s+(.*)$/);
        if (listMatch) {
          let content = listMatch[1];
          const boldParts = content.split(/\*\*|__/);
          return (
            <div key={idx} className="flex items-start gap-2 ml-4 my-2 text-[20px] font-bold text-gray-700 leading-relaxed">
              <span className="text-purple-500 mt-1 shrink-0 font-black">・</span>
              <span className="flex-1">
                {boldParts.map((part, pIdx) => pIdx % 2 === 1 ? <strong key={pIdx} className="text-purple-700 font-extrabold bg-purple-50 px-1 rounded">{part}</strong> : part)}
              </span>
            </div>
          );
        }
        
        if (currentLine.includes('**')) {
          const boldParts = currentLine.split(/\*\*|__/);
          return (
            <p key={idx} className="text-[20px] font-bold text-gray-700 leading-relaxed min-h-[1.5em] my-1.5">
              {boldParts.map((part, pIdx) => pIdx % 2 === 1 ? <strong key={pIdx} className="text-purple-700 font-extrabold bg-purple-50 px-1 rounded">{part}</strong> : part)}
            </p>
          );
        }
        
        return (
          <p key={idx} className="text-[20px] font-bold text-gray-700 leading-relaxed min-h-[1.5em] my-1.5">
            {currentLine}
          </p>
        );
      });
    };

    const cleanMarkdownForCopy = (text) => {
      if (!text) return "";
      return text
        .replace(/^(#{1,6})\s*(.*)$/gm, '■ $2')
        .replace(/^[\*\-\+]\s+/gm, '・ ')
        .replace(/\*\*|__/g, '');
    };

    function App() {
      const [cases, setCases] = useState([]);
      const [isDataLoading, setIsDataLoading] = useState(true);
      const [isFallbackMode, setIsFallbackMode] = useState(false);

      const [searchQuery, setSearchQuery] = useState("");
      const [selectedCategory, setSelectedCategory] = useState("すべて");
      const [selectedTags, setSelectedTags] = useState([]);
      
      const [scale, setScale] = useState(1);
      const [appHeight, setAppHeight] = useState(1024);
      const [offsetX, setOffsetX] = useState(0);
      
      const [layoutMode, setLayoutMode] = useState('portrait');
      const [containerWidth, setContainerWidth] = useState(768);
      
      const [isFilterOpen, setIsFilterOpen] = useState(false);

      const [aiMode, setAiMode] = useState(() => localStorage.getItem('ai_mode') || "gemini");
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || "");
      const [localBaseUrl, setLocalBaseUrl] = useState(() => localStorage.getItem('local_base_url') || "http://localhost:8080/v1");
      
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [tempAiMode, setTempAiMode] = useState("gemini");
      const [tempApiKey, setTempApiKey] = useState("");
      const [tempLocalBaseUrl, setTempLocalBaseUrl] = useState("");

      const [isAiModalOpen, setIsAiModalOpen] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiContent, setAiContent] = useState("");
      const [aiTargetCase, setAiTargetCase] = useState(null);
      const [aiError, setAiError] = useState("");

      const [isHelpOpen, setIsHelpOpen] = useState(false);
      const [isGemmaHelpOpen, setIsGemmaHelpOpen] = useState(false);

      const [myList, setMyList] = useState(() => {
        try {
          const saved = localStorage.getItem('app_my_list');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });
      const [isMyListOpen, setIsMyListOpen] = useState(false);
      const [confirmAddCase, setConfirmAddCase] = useState(null);
      const [confirmDeleteId, setConfirmDeleteId] = useState(null);
      const [viewAiPlan, setViewAiPlan] = useState(null);
      const [viewSavedCase, setViewSavedCase] = useState(null);

      const [lastModifiedDate, setLastModifiedDate] = useState("");

      const listRef = useRef(null);

      useEffect(() => {
        localStorage.setItem('app_my_list', JSON.stringify(myList));
      }, [myList]);

      useEffect(() => {
        const loadCasesData = async () => {
          try {
            const response = await fetch('./cases.json');
            if (!response.ok) throw new Error("Network response was not ok");
            
            const lastModifiedHeader = response.headers.get('Last-Modified');
            if (lastModifiedHeader) {
              const date = new Date(lastModifiedHeader);
              const formattedDate = `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
              setLastModifiedDate(formattedDate);
            } else {
              setLastModifiedDate("-");
            }

            const rawData = await response.json();
            
            let dataArray = [];
            if (Array.isArray(rawData)) {
              dataArray = rawData;
            } else if (typeof rawData === 'object' && rawData !== null) {
              const firstArrayKey = Object.keys(rawData).find(key => Array.isArray(rawData[key]));
              if (firstArrayKey) dataArray = rawData[firstArrayKey];
            }

            const formattedCases = dataArray.map(item => {
              let tagsArray = [];
              if (Array.isArray(item.tags)) {
                tagsArray = item.tags;
              } else if (typeof item.tags === 'string') {
                tagsArray = item.tags.split(',').map(t => t.trim()).filter(Boolean);
              }
              return { ...item, tags: tagsArray };
            });

            if (formattedCases.length === 0) throw new Error("有効なデータが見つかりません");
            setCases(formattedCases);
            setIsDataLoading(false);
          } catch (error) {
            console.warn("ローカル/プレビュー環境のため、テストデータを読み込みました:", error);
            setCases(DUMMY_DATA);
            setIsFallbackMode(true);
            setIsDataLoading(false);
            setLastModifiedDate("テスト環境");
          }
        };
        loadCasesData();
      }, []);

      useEffect(() => {
        const handleResize = () => {
          const isLandscape = window.innerWidth > window.innerHeight;
          setLayoutMode(isLandscape ? 'landscape' : 'portrait');
          
          const baseWidth = isLandscape ? 1200 : 768;
          setContainerWidth(baseWidth);

          const currentScale = Math.min(window.innerWidth / baseWidth, 1.0);
          setScale(currentScale);
          
          const calculatedHeight = window.innerHeight / currentScale;
          setAppHeight(calculatedHeight);

          const calculatedOffsetX = Math.max(0, (window.innerWidth - baseWidth * currentScale) / 2);
          setOffsetX(calculatedOffsetX);
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const allTags = useMemo(() => {
        const tags = new Set();
        if (Array.isArray(cases)) {
          cases.forEach(c => {
            if (selectedCategory === "すべて" || c.category === selectedCategory) {
              if (Array.isArray(c.tags)) {
                c.tags.forEach(t => tags.add(t));
              }
            }
          });
        }
        return Array.from(tags).sort();
      }, [cases, selectedCategory]);

      const filteredCases = useMemo(() => {
        if (!Array.isArray(cases)) return [];
        return cases.filter(c => {
          const matchCategory = selectedCategory === "すべて" || c.category === selectedCategory;
          const caseTags = Array.isArray(c.tags) ? c.tags : [];
          const matchSearch = c.title?.includes(searchQuery) || c.summary?.includes(searchQuery) || caseTags.some(tag => tag.includes(searchQuery));
          const matchTags = selectedTags.every(t => caseTags.includes(t));
          return matchCategory && matchSearch && matchTags;
        });
      }, [cases, searchQuery, selectedCategory, selectedTags]);

      const toggleTag = (tag) => {
        if (selectedTags.includes(tag)) {
          setSelectedTags(selectedTags.filter(t => t !== tag));
        } else {
          setSelectedTags([...selectedTags, tag]);
        }
      };

      const scrollToTop = () => {
        if (listRef.current) {
          listRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const handleSaveSettings = () => {
        setAiMode(tempAiMode);
        localStorage.setItem('ai_mode', tempAiMode);
        
        setApiKey(tempApiKey);
        localStorage.setItem('gemini_api_key', tempApiKey);
        
        setLocalBaseUrl(tempLocalBaseUrl);
        localStorage.setItem('local_base_url', tempLocalBaseUrl);
        
        setIsSettingsOpen(false);
      };

      const handleDeleteApiKey = () => {
        if (tempAiMode === 'gemini') {
          setApiKey("");
          setTempApiKey("");
          localStorage.removeItem('gemini_api_key');
        } else {
          setLocalBaseUrl("http://localhost:8080/v1");
          setTempLocalBaseUrl("http://localhost:8080/v1");
          localStorage.removeItem('local_base_url');
        }
      };

      const addToMyList = (type, title, content, caseData) => {
        const newItem = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
          type, 
          timestamp: Date.now(),
          title,
          content,
          caseData
        };
        setMyList(prev => [newItem, ...prev]);
      };

      const executeDeleteFromMyList = () => {
        if (confirmDeleteId) {
          setMyList(prev => prev.filter(item => item.id !== confirmDeleteId));
          setConfirmDeleteId(null);
        }
      };

      const generateAiPlan = async (item) => {
        if (aiMode === 'gemini' && !apiKey) {
          setTempAiMode('gemini');
          setTempApiKey("");
          setTempLocalBaseUrl(localBaseUrl);
          setIsSettingsOpen(true);
          return;
        }

        setAiTargetCase(item);
        setIsAiModalOpen(true);
        setAiLoading(true);
        setAiContent("");
        setAiError("");

        try {
          const prompt = `あなたは特別支援教育の経験豊富な専門家です。明日から実際の授業で使える具体的な【指導の略案】を作成してください。

※重要：出力時に「*」や「#」、「**」などのマークダウン記号は、画面表示が崩れるため【絶対に】使用しないでください。
大見出しは「【指導の目標】」のようにカッコで囲む形式にし、箇条書きは「・」を使用し、強調したいテキストはカッコ（「」や【】）で表現してください。

対象：小学生〜中学生の該当課題を持つ児童生徒
出力形式（必ず以下の見出しに沿ってわかりやすく記述）：
【指導の目標】
【準備物・環境設定】
【指導の展開（導入・展開・まとめ）】
【指導上の留意点・評価基準】

--- 事例データ ---
名称：${item.title}
区分：${item.category}
場面：${item.scene}
概要：${item.summary}
課題タグ：${(item.tags || []).join(', ')}`;
          
          let generatedText = "";

          if (aiMode === 'gemini') {
            const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`;
            const listRes = await fetch(listUrl);
            
            if (!listRes.ok) throw new Error("APIキーが無効か、モデル一覧が取得できませんでした。設定からAPIキーが正しく入力されているか確認してください。");
            
            const listData = await listRes.json();
            const availableModels = listData.models || [];
            
            const generateModels = availableModels.filter(m => 
              m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent")
            );

            if (generateModels.length === 0) throw new Error("このAPIキーで利用可能なテキスト生成モデルが見つかりません。");

            let selectedModel = generateModels.find(m => m.name.includes("gemini-3.5-flash"));
            if (!selectedModel) selectedModel = generateModels.find(m => m.name.includes("gemini-2.5-flash"));
            if (!selectedModel) selectedModel = generateModels.find(m => m.name.includes("gemini-1.5-flash"));
            if (!selectedModel) selectedModel = generateModels.find(m => m.name.includes("gemini"));
            if (!selectedModel) selectedModel = generateModels[0]; 

            const exactModelName = selectedModel.name; 
            const generateUrl = `https://generativelanguage.googleapis.com/v1beta/${exactModelName}:generateContent?key=${apiKey}`;

            const payload = {
              contents: [{ parts: [{ text: prompt }] }]
            };

            const res = await fetch(generateUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            
            if (!res.ok) {
              let errorMsg = `HTTP Error: ${res.status}`;
              try {
                const errorData = await res.json();
                if (errorData.error && errorData.error.message) {
                  errorMsg = errorData.error.message;
                }
              } catch (e) {}
              throw new Error(`生成エラー: ${errorMsg}`);
            }
            
            const data = await res.json();
            generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

          } else if (aiMode === 'local') {
            const cleanBaseUrl = localBaseUrl.replace(/\/+$/, '');
            const generateUrl = `${cleanBaseUrl}/chat/completions`;

            const payload = {
              model: "gemma-4-e2b", 
              messages: [
                { role: "system", content: "あなたは特別支援教育の経験豊富な専門家です。明るく、具体的で、先生方が実践しやすい言葉遣いで記述してください。マークダウンの記号(*や#)は絶対に使用しないでください。" },
                { role: "user", content: prompt }
              ],
              temperature: 0.7
            };

            const res = await fetch(generateUrl, {
              method: "POST",
              headers: { "Content-Type": "application/json" }, 
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              let errorMsg = `HTTP Error: ${res.status}`;
              try {
                const errorData = await res.json();
                if (errorData.error && errorData.error.message) {
                  errorMsg = errorData.error.message;
                }
              } catch (e) {}
              throw new Error(`ローカル生成エラー: ${errorMsg}`);
            }

            const data = await res.json();
            generatedText = data.choices?.[0]?.message?.content;
          }
          
          if (generatedText) {
            setAiContent(generatedText);
            addToMyList('ai_plan', item.title, generatedText, item);
          } else {
            throw new Error("応答テキストが空でした");
          }

        } catch (err) {
          console.error("AI Generation Error:", err);
          
          let errMessage = "Unknown Error";
          if (err) {
            if (err instanceof Error) {
              errMessage = err.message || err.toString();
            } else if (typeof err === 'object' && 'message' in err) {
              errMessage = String(err.message);
            } else {
              errMessage = String(err);
            }
          }
          
          let errMsg = errMessage;
          const lowerErr = errMessage.toLowerCase();

          const isNetworkError = 
            lowerErr.includes('failed to fetch') || 
            lowerErr.includes('networkerror') || 
            lowerErr.includes('load failed') || 
            lowerErr.includes('network error') ||
            lowerErr.includes('typeerror') ||
            lowerErr.includes('failed');

          if (isNetworkError) {
            if (aiMode === 'local') {
